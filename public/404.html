<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GroupUp</title>
  <script>
    var l = window.location;
    var base = '/groupup';
    var path = l.pathname.replace(base, '') || '/';
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/#' + path + (l.search || '')
    );
  </script>
</head>
<body></body>
</html>
